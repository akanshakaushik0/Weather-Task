<div class="card log-page">
  <div class="log-header">
    <div>
      <div class="card-title" style="margin-bottom:0"><span class="dot" style="background:#a78bfa"></span> ACTIVITY LOG</div>
      <div class="log-count">{{ logs.length }} entries</div>
    </div>
    <button class="btn btn-ghost btn-sm" (click)="clearLogs.emit()">🗑 Clear All</button>
  </div>
  <div class="log-filters">
    <button class="filter-btn" [class.active]="filter === 'all'" (click)="setFilter('all')">All</button>
    <button class="filter-btn" [class.active]="filter === 'search'" (click)="setFilter('search')">🔍 Searched</button>
    <button class="filter-btn" [class.active]="filter === 'save'" (click)="setFilter('save')">💾 Saved</button>
    <button class="filter-btn" [class.active]="filter === 'remove'" (click)="setFilter('remove')">🗑 Removed</button>
    <button class="filter-btn" [class.active]="filter === 'compare'" (click)="setFilter('compare')">⚖ Compared</button>
    <button class="filter-btn" [class.active]="filter === 'error'" (click)="setFilter('error')">⚠ Errors</button>
  </div>
  <div class="log-list">
    @if (filteredLogs.length === 0) {
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">No activity yet. Start by searching a city!</div>
      </div>
    } @else {
      @for (log of filteredLogs; track log.ts) {
        <div class="log-item">
          <div class="log-type-badge">{{ getEmoji(log.type) }}</div>
          <div class="log-content">
            <div class="log-msg">{{ log.message }}</div>
            <div class="log-ts">{{ log.ts | date:'medium' }}</div>
          </div>
        </div>
      }
    }
  </div>
</div>
